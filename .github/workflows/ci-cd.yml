name: CI/CD Pipeline

on:
  push:
    branches: [ "develop", "main" ]
  pull_request:
    branches: [ "develop", "main" ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: /tmp/composer-cache
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.json') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist --no-scripts

      - name: Check PHP Syntax (Lint)
        run: |
          find . -name "*.php" ! -path "./vendor/*" ! -path "./Public/*" -print0 | xargs -0 -n 1 -P 4 php -l

  build-docker:
    needs: lint-and-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: web-qlsp:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    deploy:
    needs: build-docker
    runs-on: self-hosted  # 👈 THAY ĐỔI: Chuyển từ ubuntu-latest sang self-hosted để chạy trên máy ảo của bạn
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    steps:
      - name: Deploy Application locally
        run: |
          cd /opt/web_qlsp
          git fetch origin
          git reset --hard origin/develop
          bash deploy.sh
