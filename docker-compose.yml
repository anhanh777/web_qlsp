services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: web_qlsp_app
    restart: always
    ports:
      - "8080:80"
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASS=${DB_ROOT_PASSWORD:-root_password}
      - DB_NAME=quanao
      - DB_PORT=3306
    volumes:
      - .:/var/www/html/web_qlsp
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: web_qlsp_db
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    ports:
      - "127.0.0.1:3307:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD:-root_password}
      - MYSQL_DATABASE=quanao
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-root_password}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  mysql_data:
